<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Co-transcriptional Folding Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root {
    --bg: #ffffff;
    --bg-soft: #ffffff;
    --surface: #ffffff;
    --surface-2: #ffffff;
    --line: #e4ebe3;
    --line-strong: #d7e2d5;
    --text: #203126;
    --text-soft: #4d5e53;
    --muted: #7a8a80;
    --accent: #3aa57a;
    --accent-2: #2f8f69;
    --accent-soft: rgba(58, 165, 122, .10);
    --shadow: 0 14px 36px rgba(27, 46, 34, .08);
    --plot-w: 800px;
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background: #ffffff;
  }
  a { color: inherit; text-decoration: none; }
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #ffffff;
    border-bottom: 1px solid #e8eee8;
    backdrop-filter: blur(14px);
  }
  .site-nav-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 22px;
    min-height: 78px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    color: var(--accent-2);
  }
  .brand-mark {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
    box-shadow: 0 0 0 6px rgba(58,165,122,.10);
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    color: var(--text-soft);
    font-size: 15px;
    font-weight: 500;
  }
  .nav-links a.active {
    color: var(--accent);
    font-weight: 700;
  }
  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 34px 22px 56px;
  }
  .hero {
    display: block;
    margin-bottom: 22px;
  }
  .hero-copy {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 28px 30px;
    box-shadow: var(--shadow);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  h1 {
    margin: 16px 0 10px;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.02;
    letter-spacing: -.04em;
    color: #1e2f25;
  }
  .hero-text {
    max-width: 760px;
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.75;
  }
  .tabs {
    display: flex;
    gap: 10px;
    margin: 18px 0 20px;
    flex-wrap: wrap;
  }
  .tab-btn {
    border: 1px solid var(--line-strong);
    background: #fff;
    color: var(--text-soft);
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all .18s ease;
    box-shadow: 0 3px 8px rgba(31,49,38,.025);
  }
  .tab-btn:hover {
    border-color: rgba(58,165,122,.32);
    color: var(--accent-2);
    transform: translateY(-1px);
  }
  .tab-btn.active {
    color: #fff;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
    border-color: transparent;
    box-shadow: 0 10px 24px rgba(58,165,122,.22);
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px 15px;
    box-shadow: 0 6px 16px rgba(31,49,38,.04);
  }
  .metric .label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .metric .value {
    font-size: 24px;
    margin-top: 7px;
    font-weight: 700;
    color: var(--text);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .section-title {
    margin: 0 0 6px;
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: -.02em;
  }
  .section-sub {
    color: var(--text-soft);
    margin-bottom: 14px;
    line-height: 1.6;
    font-size: 14px;
    max-width: 820px;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .play-btn {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    min-width: 82px;
    transition: transform .16s ease, box-shadow .16s ease;
    box-shadow: 0 10px 22px rgba(58,165,122,.22);
  }
  .play-btn:hover { transform: translateY(-1px); }
  .kbox {
    min-width: 112px;
    padding: 9px 11px;
    border-radius: 12px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--text-soft);
  }
  .playback-shell,
  .chart-shell,
  .seq-shell {
    background: linear-gradient(180deg, #fbfcfb 0%, #f7faf7 100%);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.85);
  }
  .playback-shell { margin-bottom: 12px; padding: 12px 0; }
  .chart-shell, .seq-shell { overflow: hidden; }
  .playback-scroll,
  .chart-scroll,
  .seq-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(58,165,122,.30) transparent;
  }
  .playback-scroll::-webkit-scrollbar,
  .chart-scroll::-webkit-scrollbar,
  .seq-scroll::-webkit-scrollbar { height: 8px; }
  .playback-scroll::-webkit-scrollbar-thumb,
  .chart-scroll::-webkit-scrollbar-thumb,
  .seq-scroll::-webkit-scrollbar-thumb {
    background: rgba(58,165,122,.26);
    border-radius: 999px;
  }
  .playback-scroll { padding-bottom: 2px; }
  .chart-scroll { padding: 14px 0 6px; }
  .seq-scroll { position: relative; padding: 16px 0; }
  .playback-inner,
  .chart-inner,
  .seq-inner {
    position: relative;
    margin: 0 auto;
  }
  .slider-lane {
    box-sizing: border-box;
    padding-left: 72px;
    padding-right: 20px;
  }
  .slider-lane input[type=range] {
    display: block;
    width: 100%;
    margin: 0;
    accent-color: var(--accent);
  }
  #chart { display: block; height: 310px; }
  .seq-cursor {
    position: absolute;
    top: 16px;
    bottom: 16px;
    width: 2px;
    background: linear-gradient(180deg, rgba(58,165,122,.75), rgba(58,165,122,.20));
    box-shadow: 0 0 0 1px rgba(58,165,122,.05);
    pointer-events: none;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px 14px;
    border-top: 1px solid rgba(32,49,38,.06);
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--text-soft);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    padding: 7px 11px;
    border-radius: 999px;
    background: #fff;
    border: 1px solid var(--line);
    transition: all .16s ease;
  }
  .legend-item:hover {
    border-color: rgba(58,165,122,.22);
    transform: translateY(-1px);
  }
  .legend-item.hidden {
    opacity: .42;
    text-decoration: line-through;
  }
  .legend-swatch {
    width: 16px;
    height: 3px;
    border-radius: 99px;
    flex: 0 0 auto;
  }
  .legend-swatch.dashed {
    background: repeating-linear-gradient(90deg, currentColor 0 4px, transparent 4px 8px);
    height: 2px;
  }
  .seq-grid {
    display: grid;
    grid-template-columns: 72px var(--plot-w);
    row-gap: 3px;
    align-items: start;
    width: calc(72px + var(--plot-w));
    padding-right: 20px;
  }
  .seq-label {
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.56;
    text-align: right;
    padding-right: 10px;
    white-space: pre;
    user-select: none;
    opacity: .96;
  }
  .seq-line {
    width: var(--plot-w);
    min-width: var(--plot-w);
    overflow: visible;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.56;
    white-space: pre;
    color: #31453a;
    letter-spacing: 0;
  }
  .detail-table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fbfcfa;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    padding: 10px 10px;
    border-bottom: 1px solid rgba(32,49,38,.07);
    text-align: left;
    white-space: nowrap;
  }
  th {
    color: var(--muted);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .03em;
    text-transform: uppercase;
    background: #f7faf7;
  }
  tr:last-child td { border-bottom: none; }
  .detail-note {
    color: var(--text-soft);
    margin-top: 12px;
    line-height: 1.65;
    font-size: 13px;
  }
  @media (max-width: 900px) {
    .site-nav-inner { padding: 0 16px; min-height: 70px; }
    .nav-links { gap: 16px; font-size: 14px; }
    .wrap { padding: 22px 16px 40px; }
    .card { padding: 18px; }
  }
  @media (max-width: 680px) {
    h1 { font-size: 32px; }
    .hero-copy { padding: 20px; }
    .section-title { font-size: 22px; }
  }
</style>
</head>

<nav class="site-nav">

    <a class="brand" href="../../index.html"><span class="brand-mark"></span><span>Sixiang Zhang</span></a>

  </div>

      <h1>Co-transcriptional Folding Viewer</h1>

  <div class="card">

    <div class="controls">

        </div>
      </div>
    </div>

    <div class="chart-shell">
      <div class="chart-scroll" id="chartScroll">
        <div class="chart-inner" id="chartInner">
          <canvas id="chart"></canvas>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div style="height:10px"></div>

    <div class="seq-shell">
      <div class="seq-scroll" id="seqScroll">
        <div class="seq-inner" id="seqInner">
          <div class="seq-cursor" id="seqCursor"></div>
          <div class="seq-grid">

            <div class="seq-label">True</div><div class="seq-line" id="lineTrue"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

const TRUE_COLORS = ['#3aa57a', '#2f8f69', '#6ba84b', '#4b9f91', '#7cbf69', '#5a8e72', '#8abf7f', '#6ea58b'];
const ALT_COLORS = ['#bcc7be', '#aab8ae', '#c6d0c7', '#b4c1b8', '#cfd7d0', '#a6b1a9', '#d6ddd7', '#b8c4bb'];

const metrics = document.getElementById('metrics');
const legend = document.getElementById('legend');
const chartCanvas = document.getElementById('chart');
const chartCtx = chartCanvas.getContext('2d');
const playbackScroll = document.getElementById('playbackScroll');
const playbackInner = document.getElementById('playbackInner');
const chartScroll = document.getElementById('chartScroll');
const chartInner = document.getElementById('chartInner');
const seqScroll = document.getElementById('seqScroll');
const seqInner = document.getElementById('seqInner');
const seqCursor = document.getElementById('seqCursor');
const slider = document.getElementById('slider');
const kText = document.getElementById('kText');
const playBtn = document.getElementById('playBtn');

const lineRuler1 = document.getElementById('lineRuler1');
const lineRuler2 = document.getElementById('lineRuler2');
const lineSeq = document.getElementById('lineSeq');
const linePair = document.getElementById('linePair');
const lineTrue = document.getElementById('lineTrue');

const GEOM = {
  left: 72,
  right: 20,
  top: 18,
  bottom: 42,
  plotH: 310,
  fontPx: 12,
  seqRight: 20,
};

let currentKey = '5s';
let currentK = 1;
let playing = false;
let animId = null;
let lastTs = 0;
let finishedPlayback = false;
let syncingScroll = false;
let hiddenByKey = { '5s': new Set(), 'trna': new Set() };
let charW = 8;
let dpr = Math.max(1, window.devicePixelRatio || 1);

function measureCharWidth() {
  const ref = document.querySelector('.seq-line');
  const cs = window.getComputedStyle(ref);
  const probe = document.createElement('span');
  probe.style.position = 'absolute';
  probe.style.visibility = 'hidden';
  probe.style.whiteSpace = 'pre';
  probe.style.fontFamily = cs.fontFamily;
  probe.style.fontSize = cs.fontSize;
  probe.style.fontWeight = cs.fontWeight;
  probe.style.letterSpacing = cs.letterSpacing;
  probe.style.lineHeight = cs.lineHeight;
  probe.textContent = '0'.repeat(200);
  document.body.appendChild(probe);
  const width = probe.getBoundingClientRect().width / 200;
  document.body.removeChild(probe);
  return width || 8;
}

function getData() {
  return DATA[currentKey];
}

function getHiddenSet() {
  return hiddenByKey[currentKey];
}

function plotWidthFor(d) {
  return Math.max(1, d.L * charW);
}

function totalChartWidthFor(d) {
  return GEOM.left + plotWidthFor(d) + GEOM.right;
}

function xForK(k) {
  return GEOM.left + (k - 0.5) * charW;
}

function updateInnerWidths() {
  const d = getData();
  const plotW = plotWidthFor(d);
  const naturalW = GEOM.left + plotW + GEOM.right;

  playbackInner.style.width = naturalW + 'px';
  chartInner.style.width = naturalW + 'px';
  seqInner.style.width = naturalW + 'px';

  document.documentElement.style.setProperty('--plot-w', plotW + 'px');
}

function resizeCanvas() {
  const cssW = chartInner.getBoundingClientRect().width;
  const cssH = GEOM.plotH;
  chartCanvas.style.width = cssW + 'px';
  chartCanvas.style.height = cssH + 'px';
  chartCanvas.width = Math.max(1, Math.round(cssW * dpr));
  chartCanvas.height = Math.max(1, Math.round(cssH * dpr));
  chartCtx.setTransform(1, 0, 0, 1, 0, 0);
  chartCtx.scale(dpr, dpr);
}

function ensureLegend() {
  const d = getData();
  const hidden = getHiddenSet();
  legend.innerHTML = '';

  d.stems.forEach(function(s, i) {
    const el = document.createElement('div');
    el.className = 'legend-item' + (hidden.has(i) ? ' hidden' : '');
    const sw = document.createElement('div');
    sw.className = 'legend-swatch';
    sw.style.background = TRUE_COLORS[i % TRUE_COLORS.length];
    el.appendChild(sw);
    el.appendChild(document.createTextNode(s.name + ' (' + s.bp + ' bp)'));
    el.addEventListener('click', function() {
      if (hidden.has(i)) hidden.delete(i); else hidden.add(i);
      ensureLegend();
      drawChart();
    });
    legend.appendChild(el);
  });

  (d.alt_stems || []).forEach(function(s, i) {
    const idx = d.stems.length + i;
    const el = document.createElement('div');
    el.className = 'legend-item' + (hidden.has(idx) ? ' hidden' : '');
    const sw = document.createElement('div');
    sw.className = 'legend-swatch dashed';
    sw.style.color = ALT_COLORS[i % ALT_COLORS.length];
    el.appendChild(sw);
    el.appendChild(document.createTextNode(s.name + ' (' + s.bp + ' bp, k=' + s.first_k + ')'));
    el.addEventListener('click', function() {
      if (hidden.has(idx)) hidden.delete(idx); else hidden.add(idx);
      ensureLegend();
      drawChart();
    });
    legend.appendChild(el);
  });
}

function ensureMetrics() {
  const d = getData();
  metrics.innerHTML = [
    ['Length', d.L],
    ['True stems', d.stems.length],
    ['Alt stems', (d.alt_stems || []).length],
    ['Final F1', Number(d.f1).toFixed(4)],
    ['Earliest completion', d.earliest_done == null ? '-' : d.earliest_done],
    ['Latest completion', d.latest_done == null ? '-' : d.latest_done],
  ].map(function(item) {
    return '<div class="metric"><div class="label">' + item[0] + '</div><div class="value">' + item[1] + '</div></div>';
  }).join('');
}


function padRight(s, n) {
  s = s || '';
  while (s.length < n) s += ' ';
  return s;
}


function updateSeqDisplay() {
  const d = getData();
  const k = currentK;
  let r1 = '';
  let r2 = '';
  for (let i = 0; i < d.L; i++) {
    r1 += ((i + 1) % 10 === 0) ? String(Math.floor((i + 1) / 10) % 10) : ' ';
    r2 += String((i + 1) % 10);
  }
  const state = d.states[k] || '';
  const pair = d.dots[k] || '';

  lineRuler1.textContent = r1;
  lineRuler2.textContent = r2;
  lineSeq.textContent = padRight(d.seq.slice(0, k), d.L);
  linePair.textContent = padRight(pair, d.L);
  lineTrue.textContent = padRight(d.true_dot.slice(0, k), d.L);
  kText.textContent = 'k = ' + k;
  updateCursor();
}

function updateCursor() {
  seqCursor.style.left = xForK(currentK) + 'px';
}

function drawChart() {
  const d = getData();
  const W = chartCanvas.getBoundingClientRect().width;
  const H = chartCanvas.getBoundingClientRect().height;
  const plotW = plotWidthFor(d);
  const plotH = H - GEOM.top - GEOM.bottom;
  const hidden = getHiddenSet();

  chartCtx.clearRect(0, 0, W, H);

  chartCtx.strokeStyle = '#d8e2da';
  chartCtx.lineWidth = 0.9;
  for (let v = 0; v <= 1.0001; v += 0.25) {
    const y = GEOM.top + plotH * (1 - v);
    chartCtx.beginPath();
    chartCtx.moveTo(GEOM.left, y);
    chartCtx.lineTo(GEOM.left + plotW, y);
    chartCtx.stroke();
    chartCtx.fillStyle = '#74867a';
    chartCtx.font = '11px Inter';
    chartCtx.textAlign = 'right';
    chartCtx.fillText(v.toFixed(2), GEOM.left - 8, y + 4);
  }

  chartCtx.strokeStyle = 'rgba(32,49,38,.14)';
  chartCtx.beginPath();
  chartCtx.moveTo(GEOM.left, GEOM.top);
  chartCtx.lineTo(GEOM.left, GEOM.top + plotH);
  chartCtx.lineTo(GEOM.left + plotW, GEOM.top + plotH);
  chartCtx.stroke();

  const xk = xForK(currentK);
  chartCtx.strokeStyle = 'rgba(58,165,122,.42)';
  chartCtx.lineWidth = 1.3;
  chartCtx.beginPath();
  chartCtx.moveTo(xk, GEOM.top);
  chartCtx.lineTo(xk, GEOM.top + plotH);
  chartCtx.stroke();

  function plotCurve(values, color, lineWidth, dash) {
    chartCtx.strokeStyle = color;
    chartCtx.lineWidth = lineWidth;
    chartCtx.setLineDash(dash || []);
    chartCtx.beginPath();
    const maxK = Math.min(currentK, values.length - 1);
    for (let k = 1; k <= maxK; k++) {
      const x = xForK(k);
      const y = GEOM.top + plotH * (1 - values[k]);
      if (k === 1) chartCtx.moveTo(x, y); else chartCtx.lineTo(x, y);
    }
    chartCtx.stroke();
    chartCtx.setLineDash([]);
  }

  (d.alt_stems || []).forEach(function(s, i) {
    if (hidden.has(d.stems.length + i)) return;
    plotCurve(s.curve, ALT_COLORS[i % ALT_COLORS.length], 1.5, [6, 4]);
  });
  d.stems.forEach(function(s, i) {
    if (hidden.has(i)) return;
    plotCurve(s.curve, TRUE_COLORS[i % TRUE_COLORS.length], 2.4, null);
  });

  chartCtx.fillStyle = '#617367';
  chartCtx.font = '11px Inter';
  chartCtx.textAlign = 'center';
  const step = Math.max(1, Math.round(d.L / 10));
  for (let k = 1; k <= d.L; k += step) {
    chartCtx.fillText(k, xForK(k), GEOM.top + plotH + 20);
  }
  if ((d.L - 1) % step !== 0) {
    chartCtx.fillText(d.L, xForK(d.L), GEOM.top + plotH + 20);
  }
  chartCtx.fillText('Prefix length k', GEOM.left + plotW / 2, GEOM.top + plotH + 36);
}

function syncAllScroll(source) {
  if (syncingScroll) return;
  syncingScroll = true;
  const left = source.scrollLeft;
  [playbackScroll, chartScroll, seqScroll].forEach(function(el) {
    if (el !== source) el.scrollLeft = left;
  });
  requestAnimationFrame(function() { syncingScroll = false; });
}

[playbackScroll, chartScroll, seqScroll].forEach(function(el) {
  el.addEventListener('scroll', function() {
    syncAllScroll(el);
  });
});

function stopPlayback(asFinished) {
  playing = false;
  if (animId) {
    cancelAnimationFrame(animId);
    animId = null;
  }
  playBtn.textContent = asFinished ? 'Replay' : 'Play';
  if (asFinished) finishedPlayback = true;
}

function tick(ts) {
  if (!playing) return;
  if (!lastTs) lastTs = ts;
  if (ts - lastTs >= 70) {
    lastTs = ts;
    const d = getData();
    if (currentK < d.L) {
      currentK += 1;
      slider.value = currentK;
      drawChart();
      updateSeqDisplay();
    }
    if (currentK >= d.L) {
      stopPlayback(true);
      drawChart();
      updateSeqDisplay();
      return;
    }
  }
  animId = requestAnimationFrame(tick);
}

function startPlayback() {
  const d = getData();
  if (finishedPlayback || currentK > d.L) {
    currentK = 1;
    slider.value = 1;
    finishedPlayback = false;
    drawChart();
    updateSeqDisplay();
  }
  playing = true;
  playBtn.textContent = 'Pause';
  lastTs = 0;
  animId = requestAnimationFrame(tick);
}

slider.addEventListener('input', function() {
  currentK = parseInt(slider.value, 10);
  const d = getData();
  if (currentK < d.L) finishedPlayback = false;
  drawChart();
  updateSeqDisplay();
});

playBtn.addEventListener('click', function() {
  if (playing) {
    stopPlayback(false);
    return;
  }
  startPlayback();
});

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(x) { x.classList.remove('active'); });
    btn.classList.add('active');
    currentKey = btn.dataset.rna;
    const d = getData();
    stopPlayback(false);
    finishedPlayback = false;
    currentK = 1;
    slider.min = 1;
    slider.max = d.L;
    slider.value = 1;
    playbackScroll.scrollLeft = 0;
    chartScroll.scrollLeft = 0;
    seqScroll.scrollLeft = 0;
    refreshAll();
  });
});

function refreshAll() {
  const d = getData();
  slider.min = 1;
  slider.max = d.L;
  if (currentK > d.L) currentK = d.L;
  slider.value = currentK;
  ensureMetrics();
  ensureLegend();
  updateInnerWidths();
  resizeCanvas();
  drawChart();
  updateSeqDisplay();
}

window.addEventListener('resize', function() {
  charW = measureCharWidth();
  dpr = Math.max(1, window.devicePixelRatio || 1);
  refreshAll();
});

charW = measureCharWidth();
refreshAll();
</script>
